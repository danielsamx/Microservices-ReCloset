<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>ReCloset · Moda de segunda mano</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4',
                400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e',
                800: '#115e59', 900: '#134e4a', DEFAULT: '#0f766e', dark: '#115e59',
              },
              ink: { DEFAULT: '#0f172a', soft: '#334155', muted: '#64748b', faint: '#94a3b8' },
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              display: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
            },
            borderRadius: { xl: '0.875rem', '2xl': '1.125rem', '3xl': '1.5rem' },
            boxShadow: {
              card: '0 1px 2px rgba(15,23,42,.04), 0 4px 16px -4px rgba(15,23,42,.08)',
              'card-hover': '0 8px 30px -6px rgba(15,23,42,.18)',
              soft: '0 1px 3px rgba(15,23,42,.06)',
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
