# ReCloset API Gateway (API Gateway pattern)
# Single public entry point -> routes to internal microservices.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream auth_up   { server auth-service:8000; }
upstream item_up   { server item-service:8000; }
upstream chat_up   { server chat-service:8000; }
upstream media_up  { server media-service:8000; }
upstream reverb_up { server reverb:8080; }

server {
    listen 80;
    server_name _;
    client_max_body_size 60M;   # allow media uploads

    # Gateway health
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # ---- Auth service ----
    location /api/auth/ {
        proxy_pass http://auth_up;
        include /etc/nginx/proxy_common.conf;
    }

    # ---- Item service (catalog) ----
    location /api/items { proxy_pass http://item_up;  include /etc/nginx/proxy_common.conf; }
    location /api/catalog { proxy_pass http://item_up; include /etc/nginx/proxy_common.conf; }
    location /api/wardrobe { proxy_pass http://item_up; include /etc/nginx/proxy_common.conf; }
    location /api/meta { proxy_pass http://item_up; include /etc/nginx/proxy_common.conf; }

    # ---- Chat + notifications ----
    location /api/conversations { proxy_pass http://chat_up; include /etc/nginx/proxy_common.conf; }
    location /api/messages { proxy_pass http://chat_up; include /etc/nginx/proxy_common.conf; }
    location /api/notifications { proxy_pass http://chat_up; include /etc/nginx/proxy_common.conf; }
    location /api/broadcasting/auth { proxy_pass http://chat_up; include /etc/nginx/proxy_common.conf; }

    # ---- Media service ----
    location /api/media { proxy_pass http://media_up; include /etc/nginx/proxy_common.conf; }

    # ---- Reverb WebSocket (Laravel Echo connects here) ----
    location /app/ {
        proxy_pass http://reverb_up;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
