# NOTE: replace values before applying. Use `kubectl create secret` or a sealed-secrets
# controller in production. stringData is used here for readability.
apiVersion: v1
kind: Secret
metadata:
  name: recloset-secrets
  namespace: recloset
type: Opaque
stringData:
  AUTH_APP_KEY: "base64:REPLACE_AUTH_KEY"
  ITEM_APP_KEY: "base64:REPLACE_ITEM_KEY"
  CHAT_APP_KEY: "base64:REPLACE_CHAT_KEY"
  MEDIA_APP_KEY: "base64:REPLACE_MEDIA_KEY"
  DB_PASSWORD: "change_me_db_password"
  REVERB_APP_SECRET: "change_me_reverb_secret"
  INTERNAL_SERVICE_TOKEN: "change_me_internal_token"
  GRAFANA_ADMIN_PASSWORD: "change_me_grafana_admin"
