apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: item-db-pvc
  namespace: recloset
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 2Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: item-db
  namespace: recloset
spec:
  replicas: 1
  selector: { matchLabels: { app: item-db } }
  template:
    metadata: { labels: { app: item-db } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: "recloset_items" }
            - { name: POSTGRES_USER, value: "recloset" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: DB_PASSWORD } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready","-U","recloset","-d","recloset_items"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["pg_isready","-U","recloset","-d","recloset_items"] }
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: item-db-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: item-db
  namespace: recloset
spec:
  selector: { app: item-db }
  ports: [{ port: 5432, targetPort: 5432 }]
