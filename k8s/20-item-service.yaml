apiVersion: apps/v1
kind: Deployment
metadata:
  name: item-service
  namespace: recloset
  labels: { app: item-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: item-service } }
  template:
    metadata:
      labels: { app: item-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: item-service
          image: recloset/item-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: recloset-config }
          env:
            - { name: DB_HOST, value: "item-db" }
            - { name: DB_DATABASE, value: "recloset_items" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: DB_PASSWORD } }
            - name: APP_KEY
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: ITEM_APP_KEY } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: INTERNAL_SERVICE_TOKEN } }
            - name: REVERB_APP_SECRET
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: REVERB_APP_SECRET } }

          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: item-service
  namespace: recloset
spec:
  selector: { app: item-service }
  ports: [{ port: 8000, targetPort: 8000 }]
