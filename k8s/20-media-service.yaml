apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: recloset
  labels: { app: media-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: media-service } }
  template:
    metadata:
      labels: { app: media-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: media-service
          image: recloset/media-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: recloset-config }
          env:
            - { name: DB_HOST, value: "media-db" }
            - { name: DB_DATABASE, value: "recloset_media" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: DB_PASSWORD } }
            - name: APP_KEY
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: MEDIA_APP_KEY } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: INTERNAL_SERVICE_TOKEN } }
          volumeMounts:
            - { name: blob, mountPath: /var/blobstore }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
      # ReadWriteOnce PVC -> keep media on a single node (or switch to RWX/NFS to scale out)
      volumes:
        - name: blob
          persistentVolumeClaim: { claimName: media-blob-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: recloset
spec:
  selector: { app: media-service }
  ports: [{ port: 8000, targetPort: 8000 }]
