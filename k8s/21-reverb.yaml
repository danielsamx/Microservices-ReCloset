apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverb
  namespace: recloset
spec:
  replicas: 1
  selector: { matchLabels: { app: reverb } }
  template:
    metadata: { labels: { app: reverb } }
    spec:
      containers:
        - name: reverb
          image: recloset/chat-service:latest
          command: ["php","artisan","reverb:start","--host=0.0.0.0","--port=8080"]
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: recloset-config }
          env:
            - name: APP_KEY
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: CHAT_APP_KEY } }
            - name: REVERB_APP_SECRET
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: REVERB_APP_SECRET } }
            - { name: DB_HOST, value: "chat-db" }
            - { name: DB_DATABASE, value: "recloset_chat" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: DB_PASSWORD } }
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: reverb
  namespace: recloset
spec:
  selector: { app: reverb }
  ports: [{ port: 8080, targetPort: 8080 }]
