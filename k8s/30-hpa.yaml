apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: item-service-hpa, namespace: recloset }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: item-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: chat-service-hpa, namespace: recloset }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: chat-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
