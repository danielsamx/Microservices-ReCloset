apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway, namespace: recloset }
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
            - { name: conf, mountPath: /etc/nginx/proxy_common.conf, subPath: proxy_common.conf }
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 5, periodSeconds: 10 }
      volumes:
        - name: conf
          configMap: { name: gateway-nginx }
---
apiVersion: v1
kind: Service
metadata: { name: gateway, namespace: recloset }
spec:
  type: LoadBalancer
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 80 }]
