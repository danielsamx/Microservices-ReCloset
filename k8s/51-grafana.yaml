apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-datasources, namespace: recloset }
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-dashboards-provider, namespace: recloset }
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: ReCloset
        orgId: 1
        folder: ReCloset
        type: file
        options: { path: /var/lib/grafana/dashboards }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana, namespace: recloset }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports: [{ containerPort: 3000 }]
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: recloset-secrets, key: GRAFANA_ADMIN_PASSWORD } }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dash-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: data, mountPath: /var/lib/grafana }
          readinessProbe: { httpGet: { path: /api/health, port: 3000 }, initialDelaySeconds: 10, periodSeconds: 10 }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: dash-provider, configMap: { name: grafana-dashboards-provider } }
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: recloset }
spec:
  type: LoadBalancer
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
